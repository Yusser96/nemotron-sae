# Production configuration: full training over multiple (layer, component) combinations.
# CLI/launcher iterates the cartesian product of layers × components × widths × L0 targets.
run_id: prod_full_v1

model:
  name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  dtype: bfloat16
  load_quant: auto
  trust_remote_code: true
  device_map: auto

data:
  # Pretraining-distribution match for Nemotron 3 Nano. Gated behind an NVIDIA
  # data agreement on HF — accept it on the dataset page before running prod.
  # Pick a quality-bucket subset via `name` (e.g. High-Quality, Medium-High-Quality,
  # High-Quality-Synthetic). Leave null to use the default config.
  source: nvidia/Nemotron-CC-v2.1
  name: High-Quality
  split: train
  streaming: true
  total_tokens: 200000000000     # 200B tokens
  seq_len: 2048
  shuffle_buffer: 8192
  seed: 42

cache:
  shard_size_bytes: 1073741824   # 1 GiB
  shuffle_seed: 42
  tokens_per_fwd: 16384
  cache_dir: outputs/caches

sae:
  arch: jumprelu
  d_sae: [16384, 65536, 262144]
  l0_target: [10, 50, 100]
  lr: 7.0e-5
  batch_size: 4096
  n_steps: 200000
  warmup_steps: 1000
  l0_warmup_steps: 50000
  bandwidth: 0.001
  ckpt_every: 5000
  log_every: 100
  n_batches_in_buffer: 8
  ckpt_dir: outputs/checkpoints

target:
  layer: [5, 12, 25, 38, 51]
  component: [resid_post, moe_out, attn_out_prelinear]

eval:
  delta_ce_n_seqs: 2048
  delta_ce_seq_len: 1024
  fvu_n_tokens: 65536
  dead_n_tokens: 50000
  interp_enabled: false

log:
  use_wandb: true
  wandb_project: nemotron-sae
  log_dir: outputs/logs
