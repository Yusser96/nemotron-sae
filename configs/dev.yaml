# Development configuration: smoke test for one (layer, component) on a 100-doc sample.
# Same data distribution as prod (Nemotron-CC-v2.1) so any data-induced bug surfaces here too.
run_id: dev_smoke

model:
  name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  dtype: bfloat16
  load_quant: auto
  trust_remote_code: true
  device_map: auto

data:
  source: nvidia/Nemotron-CC-v2.1
  split: train
  streaming: true
  n_documents: 100
  seq_len: 1024
  shuffle_buffer: 256
  seed: 42

cache:
  shard_size_bytes: 67108864    # 64 MiB
  shuffle_seed: 42
  tokens_per_fwd: 4096
  cache_dir: outputs/caches

sae:
  arch: jumprelu
  d_sae: 4096
  l0_target: 30
  lr: 7.0e-5
  batch_size: 1024
  n_steps: 1000
  warmup_steps: 100
  l0_warmup_steps: 200
  bandwidth: 0.001
  ckpt_every: 250
  log_every: 25
  n_batches_in_buffer: 4
  ckpt_dir: outputs/checkpoints

target:
  layer: 25
  component: resid_post

eval:
  delta_ce_n_seqs: 64
  delta_ce_seq_len: 512
  fvu_n_tokens: 16384
  dead_n_tokens: 10000
  interp_enabled: false

log:
  use_wandb: false
  log_dir: outputs/logs
